<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dia dos Namorados</title>
  <link rel="stylesheet" href="edição.css">
</head>
<body>
  <!-- Preloader -->
  <div id="preloader">
    <span class="heart">❤️</span>
  </div>

  <!-- Título -->
  <header class="hero">
    <h1 class="main-title">Feliz Dia dos Namorados 💕</h1>
  </header>

  <!-- Carta Interativa -->
  <section class="letter-container">
    <div class="letter" id="letter">
      <div class="envelope">
        <div class="flap"></div>
        <div class="seal">❤️</div>
      </div>
      <div class="paper" id="paper"></div>
    </div>
  </section>

  <!-- Álbum estilo livro -->
  <section class="album">
    <button id="prev" class="arrow">⬅️</button>
    <div class="book">
      <div class="page left">💑 Primeira página</div>
      <div class="page right">🌹 Segunda página</div>
      <div class="page left">💌 Terceira página</div>
      <div class="page right">💖 Quarta página</div>
    </div>
    <button id="next" class="arrow">➡️</button>
  </section>

  <!-- Footer -->
  <footer>
    <p>Feito com ❤️ para o Dia dos Namorados</p>
  </footer>

  <script src="edição.js"></script>
</body>
</html>
